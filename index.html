<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TCG Event Hub</title>
  <style>
    body{font-family:Arial,sans-serif;background:#0f1115;color:#fff;margin:0}
    header{padding:24px;text-align:center;background:#171a21}
    .wrap{max-width:1200px;margin:0 auto;padding:24px}
    table{width:100%;border-collapse:collapse;margin-top:20px}
    th,td{border:1px solid #263041;padding:8px;text-align:left}
    th{background:#1c2430}
    tr:nth-child(even){background:#141922}
    input,select{padding:10px;border-radius:8px;border:1px solid #2a3240;background:#10151d;color:#fff;margin-right:10px}
  </style>
</head>
<body>
  <header>
    <h1>TCG Event Hub</h1>
    <p>Automated event verification list</p>
  </header>

  <div class="wrap">

    <div>
      <input id="search" placeholder="Search events..." />
      <select id="gameFilter">
        <option value="all">All Games</option>
      </select>
    </div>

    <table id="eventsTable">
      <thead>
        <tr>
          <th>Month</th>
          <th>Game</th>
          <th>Event Type</th>
          <th>Event Name</th>
          <th>Date</th>
          <th>Source</th>
          <th>Image</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

  </div>

<script>
let allEvents=[]
const tbody=document.querySelector("#eventsTable tbody")
const search=document.getElementById("search")
const gameFilter=document.getElementById("gameFilter")

function render(){
  const term=search.value.toLowerCase()
  const game=gameFilter.value

  const filtered=allEvents.filter(e=>{
    const matchSearch=(e.event_name||"").toLowerCase().includes(term)
    const matchGame=(game==="all"||e.game_type===game)
    return matchSearch && matchGame
</html>
