<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TCG Event Hub</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #160b22 0%, #211036 45%, #12081b 100%);
      color: #f5edff;
      margin: 0;
    }

    header {
      padding: 28px 24px;
      text-align: center;
      background: rgba(52, 22, 83, 0.88);
      border-bottom: 1px solid #5d2d8a;
      box-shadow: 0 4px 20px rgba(0,0,0,.25);
    }

    .wrap {
      max-width: 1450px;
      margin: 0 auto;
      padding: 24px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 10px 16px;
      border: 1px solid #6d3ea0;
      background: #2a1541;
      color: #f5edff;
      border-radius: 10px;
      cursor: pointer;
    }

    .tab.active {
      background: #7d49b5;
      border-color: #b48cff;
      color: #fff;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    input, select {
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #6d3ea0;
      background: #1f1231;
      color: #f5edff;
    }

    input {
      min-width: 300px;
      flex: 1;
    }

    .meta {
      margin: 10px 0 16px;
      color: #d7c3f4;
      font-size: 13px;
    }

    .empty {
      padding: 24px 0;
      color: #d7c3f4;
    }

    .hidden {
      display: none;
    }

    .release-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-top: 10px;
    }

    .release-card {
      background: rgba(35, 18, 54, 0.92);
      border: 1px solid #5b3488;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,.18);
    }

    .release-card img {
      width: 100%;
      max-height: 180px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 12px;
      border: 1px solid #6d3ea0;
      background: #fff;
    }

    .release-date {
      color: #d8c1ff;
      font-size: 13px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .release-game {
      color: #c598ff;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .release-title {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 10px;
      line-height: 1.2;
    }

    .release-desc {
      color: #e9defb;
      line-height: 1.45;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .release-link a {
      color: #d2b8ff;
      text-decoration: none;
      font-weight: 600;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 14px;
      background: rgba(27, 15, 43, 0.85);
    }

    th, td {
      border: 1px solid #4f2d73;
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #361c57;
      position: sticky;
      top: 0;
    }

    tr:nth-child(even) {
      background: rgba(56, 28, 87, 0.35);
    }

    a {
      color: #d2b8ff;
    }

    .play-image {
      max-width: 80px;
      max-height: 80px;
      border-radius: 6px;
      display: block;
      border: 1px solid #5f3490;
      background: #fff;
    }

    .desc {
      max-width: 420px;
      white-space: normal;
      line-height: 1.35;
    }

    .badge-release,
    .badge-play {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge-release {
      background: #5f2f91;
      color: #f5edff;
    }

    .badge-play {
      background: #3d2460;
      color: #f5edff;
    }
  </style>
</head>
<body>
  <header>
    <h1>TCG Event Hub</h1>
    <p>Automated verification list for releases and play events</p>
  </header>

  <div class="wrap">
    <div class="tabs">
      <button class="tab active" data-mode="release">Releases</button>
      <button class="tab" data-mode="play">Play</button>
      <button class="tab" data-mode="all">All</button>
    </div>

    <div class="toolbar">
      <input id="search" type="text" placeholder="Search games, names, descriptions, notes..." />
      <select id="gameFilter">
        <option value="all">All Games</option>
      </select>
    </div>

    <div class="meta" id="summary"></div>

    <div id="releaseView" class="release-grid"></div>

    <div id="playView" class="hidden">
      <table id="eventsTable">
        <thead>
          <tr>
            <th>Month</th>
            <th>Game</th>
            <th>Event Type</th>
            <th>Event Name</th>
            <th>Date</th>
            <th>Description</th>
            <th>Source</th>
            <th>Image</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div id="emptyState" class="empty hidden">No events found.</div>
  </div>

  <script>
    let allEvents = [];
    let currentMode = "release";

    const search = document.getElementById("search");
    const gameFilter = document.getElementById("gameFilter");
    const summary = document.getElementById("summary");
    const emptyState = document.getElementById("emptyState");
    const tabs = document.querySelectorAll(".tab");
    const releaseView = document.getElementById("releaseView");
    const playView = document.getElementById("playView");
    const tbody = document.querySelector("#eventsTable tbody");

    function safe(value) {
      return value ?? "";
    }

    function isRelease(eventType) {
      return (eventType || "").toLowerCase() === "release";
    }

    function isPlay(eventType) {
      return (eventType || "").toLowerCase().startsWith("play");
    }

    function badge(eventType) {
      if (isRelease(eventType)) {
        return `<span class="badge-release">${safe(eventType)}</span>`;
      }
      if (isPlay(eventType)) {
        return `<span class="badge-play">${safe(eventType)}</span>`;
      }
      return safe(eventType);
    }

    function normalizeDateForSort(e) {
      return e.event_date || "9999-99-99";
    }

    function compareEvents(a, b) {
      const aDate = normalizeDateForSort(a);
      const bDate = normalizeDateForSort(b);

      if (aDate !== bDate) {
        return aDate.localeCompare(bDate);
      }

      const aGame = a.game_type || "";
      const bGame = b.game_type || "";
      if (aGame !== bGame) {
        return aGame.localeCompare(bGame);
      }

      const aName = a.event_name || "";
      const bName = b.event_name || "";
      return aName.localeCompare(bName);
    }

    function filterEvents() {
      const term = search.value.trim().toLowerCase();
      const selectedGame = gameFilter.value;

      const filtered = allEvents.filter(e => {
        const haystack = [
          e.month,
          e.kind,
          e.game_type,
          e.event_type,
          e.event_name,
          e.event_date,
          e.event_date_display,
          e.event_description,
          e.source_site,
          e.source_url,
          e.location_text,
          e.notes
        ]
          .filter(Boolean)
          .join(" ")
          .toLowerCase();

        const matchSearch = !term || haystack.includes(term);
        const matchGame = selectedGame === "all" || e.game_type === selectedGame;

        let matchMode = true;
        if (currentMode === "release") {
          matchMode = e.kind === "release" || isRelease(e.event_type);
        } else if (currentMode === "play") {
          matchMode = e.kind === "play" || isPlay(e.event_type);
        }

        return matchSearch && matchGame && matchMode;
      });

      filtered.sort(compareEvents);
      return filtered;
    }

    function renderReleaseCards(events) {
      releaseView.innerHTML = "";

      events.forEach(e => {
        const card = document.createElement("div");
        card.className = "release-card";
        card.innerHTML = `
          ${e.image_url ? `<img src="${safe(e.image_url)}" alt="${safe(e.image_alt)}">` : ""}
          <div class="release-game">${safe(e.game_type)}</div>
          <div class="release-date">${safe(e.event_date_display || e.month)}</div>
          <div class="release-title">${safe(e.event_name)}</div>
          <div class="release-desc">${safe(e.event_description)}</div>
          <div class="release-link">
            ${e.source_url ? `<a href="${safe(e.source_url)}" target="_blank" rel="noopener noreferrer">${safe(e.source_site || "Source")}</a>` : safe(e.source_site)}
          </div>
        `;
        releaseView.appendChild(card);
      });
    }

    function renderPlayTable(events) {
      tbody.innerHTML = "";

      events.forEach(e => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${safe(e.month)}</td>
          <td>${safe(e.game_type)}</td>
          <td>${badge(e.event_type)}</td>
          <td>${safe(e.event_name)}</td>
          <td>${safe(e.event_date_display || e.event_date)}</td>
          <td class="desc">${safe(e.event_description)}</td>
          <td>
            ${
              e.source_url
                ? `<a href="${e.source_url}" target="_blank" rel="noopener noreferrer">${safe(e.source_site)}</a>`
                : safe(e.source_site)
            }
          </td>
          <td>
            ${e.image_url ? `<img class="play-image" src="${e.image_url}" alt="${safe(e.image_alt)}">` : ""}
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function renderAllTable(events) {
      tbody.innerHTML = "";

      events.forEach(e => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${safe(e.month)}</td>
          <td>${safe(e.game_type)}</td>
          <td>${badge(e.event_type)}</td>
          <td>${safe(e.event_name)}</td>
          <td>${safe(e.event_date_display || e.event_date)}</td>
          <td class="desc">${safe(e.event_description)}</td>
          <td>
            ${
              e.source_url
                ? `<a href="${e.source_url}" target="_blank" rel="noopener noreferrer">${safe(e.source_site)}</a>`
                : safe(e.source_site)
            }
          </td>
          <td>
            ${e.image_url ? `<img class="play-image" src="${e.image_url}" alt="${safe(e.image_alt)}">` : ""}
          </td>
        `;
        tbody.appendChild(tr);
      });
    }

    function render() {
      const filtered = filterEvents();

      releaseView.classList.add("hidden");
      playView.classList.add("hidden");
      emptyState.classList.add("hidden");

      if (!filtered.length) {
        emptyState.classList.remove("hidden");
        summary.textContent = "0 events shown";
        return;
      }

      if (currentMode === "release") {
        releaseView.classList.remove("hidden");
        renderReleaseCards(filtered);
      } else if (currentMode === "play") {
        playView.classList.remove("hidden");
        renderPlayTable(filtered);
      } else {
        playView.classList.remove("hidden");
        renderAllTable(filtered);
      }

      summary.textContent = `${filtered.length} event${filtered.length === 1 ? "" : "s"} shown`;
    }

    tabs.forEach(tab => {
      tab.addEventListener("click", () => {
        tabs.forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        currentMode = tab.dataset.mode;
        render();
      });
    });

    fetch("./site/data/events-by-month.json")
      .then(response => {
        if (!response.ok) {
          throw new Error(`HTTP ${response.status} loading events-by-month.json`);
        }
        return response.json();
      })
      .then(data => {
        allEvents = Object.values(data).flat();
        allEvents.sort(compareEvents);

        const games = [...new Set(allEvents.map(e => e.game_type).filter(Boolean))].sort();
        games.forEach(game => {
          const opt = document.createElement("option");
          opt.value = game;
          opt.textContent = game;
          gameFilter.appendChild(opt);
        });

        render();
      })
      .catch(error => {
        console.error("Failed to load event data:", error);
        summary.textContent = "Failed to load event data.";
        emptyState.classList.remove("hidden");
      });

    search.addEventListener("input", render);
    gameFilter.addEventListener("change", render);
  </script>
</body>
</html>
